name: android_incubator
description: ESP32 Incubator Monitoring App via Ubidots MQTT
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mqtt_client: ^10.2.1
  fl_chart: ^0.68.0
  http: ^1.2.0 
  intl: ^0.19.0
  provider: ^6.1.2
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#1E1E2C"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
